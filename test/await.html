        var w;
        var serverPath = 'https://consolekakao.github.io';

        var loadHtml = function (path, callback) {
            var xhr = new XMLHttpRequest();
            xhr.open('GET', path, true);
            xhr.onreadystatechange = function () {
                if (this.readyState !== 4) return;
                if (this.status !== 200) return;
                callback(this.responseText);
                console.log(xhr.responseURL);
                console.log();
            };
            xhr.send();
        };
        
        var displayHtml = function () {
            loadHtml(serverPath , function (html) {
               document.querySelector('.card-title').innerText = html ;
               document.write('--------------------------------------------');
             console.log(document.getElementsByClassName('.card-title'));
            });
            return false;
        };
        

    </script>
        <button onclick="displayHtml('');">Load html</button>
            <div class="card-title"></div>
